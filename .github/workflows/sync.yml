name: Sync Timegrip → Google Calendar

on:
  schedule:
    - cron: "0 5 * * *"   # 05:00 UTC = 06:00/07:00 Copenhagen
  workflow_dispatch:        # manual trigger from the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Build timegrip-sync
        run: nix build --no-link

      - name: Run sync + generate report
        env:
          # ── Credentials (Repository Secrets) ────────────────────────────
          SALLING_EMAIL:        ${{ secrets.SALLING_EMAIL }}
          SALLING_PASSWORD:     ${{ secrets.SALLING_PASSWORD }}
          GOOGLE_CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          DB_HOST:              ${{ secrets.DB_HOST }}
          DB_USER:              ${{ secrets.DB_USER }}
          DB_PASSWORD:          ${{ secrets.DB_PASSWORD }}
          DB_DATABASE:          ${{ secrets.DB_DATABASE }}
          # ── Sync settings (Repository Variables) ────────────────────────
          SYNC_AHEAD_WEEKS:     ${{ vars.SYNC_AHEAD_WEEKS }}
          SYNC_LOOKBACK_WEEKS:  ${{ vars.SYNC_LOOKBACK_WEEKS }}
          # ── Wage config (Repository Variables) ──────────────────────────
          HOURLY_RATE:          ${{ vars.HOURLY_RATE }}
          EVENING_SUPPLEMENT:   ${{ vars.EVENING_SUPPLEMENT }}
          SATURDAY_SUPPLEMENT:  ${{ vars.SATURDAY_SUPPLEMENT }}
          SUNDAY_SUPPLEMENT:    ${{ vars.SUNDAY_SUPPLEMENT }}
          EVENING_CUTOFF_HOUR:  ${{ vars.EVENING_CUTOFF_HOUR }}
          AM_BIDRAG_PCT:        ${{ vars.AM_BIDRAG_PCT }}
          TAX_PCT:              ${{ vars.TAX_PCT }}
          EMPLOYEE_PENSION_PCT: ${{ vars.EMPLOYEE_PENSION_PCT }}
          EMPLOYER_PENSION_PCT: ${{ vars.EMPLOYER_PENSION_PCT }}
          ATP_DKK:              ${{ vars.ATP_DKK }}
          KLUB_DKK:             ${{ vars.KLUB_DKK }}
          FRITVALG_PCT:         ${{ vars.FRITVALG_PCT }}
          FERIEFRI_PCT:         ${{ vars.FERIEFRI_PCT }}
        run: |
          mkdir -p report
          nix run . -- --report report/index.html

      # ── Check whether FTP is configured ─────────────────────────────────────
      - name: Check FTP config
        id: ftp
        env:
          FTP_HOST:        ${{ secrets.FTP_HOST }}
          FTP_USER:        ${{ secrets.FTP_USER }}
          FTP_PASSWORD:    ${{ secrets.FTP_PASSWORD }}
          REPORT_PASSWORD: ${{ secrets.REPORT_PASSWORD }}
        run: |
          if [ -n "$FTP_HOST" ] && [ -n "$FTP_USER" ] && [ -n "$FTP_PASSWORD" ] && [ -n "$REPORT_PASSWORD" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      # ── FTP deploy (runs when FTP secrets are set) ───────────────────────────
      - name: Deploy report via FTP
        if: steps.ftp.outputs.enabled == 'true'
        env:
          FTP_HOST:        ${{ secrets.FTP_HOST }}
          FTP_USER:        ${{ secrets.FTP_USER }}
          FTP_PASSWORD:    ${{ secrets.FTP_PASSWORD }}
          REPORT_PASSWORD: ${{ secrets.REPORT_PASSWORD }}
          FTP_REMOTE_DIR:  ${{ vars.FTP_REMOTE_DIR }}
        run: |
          sudo apt-get install -y lftp -qq

          # .htpasswd — apache-MD5 hash, username: admin
          HASHED=$(nix-shell -p openssl --run "openssl passwd -apr1 '$REPORT_PASSWORD'")
          printf 'admin:%s\n' "$HASHED" > report/.htpasswd

          # .htaccess — use ${DOCUMENT_ROOT} so no hardcoded server path needed
          printf 'AuthType Basic\nAuthName "Loenseddel"\nAuthUserFile ${DOCUMENT_ROOT}/.htpasswd\nRequire valid-user\n' > report/.htaccess

          # Upload all three files
          lftp -c "
            open -u '$FTP_USER','$FTP_PASSWORD' ftp://$FTP_HOST
            set ftp:ssl-allow yes
            set ssl:verify-certificate no
            set ftp:passive-mode yes
            mkdir -fp $FTP_REMOTE_DIR 2>/dev/null; true
            put report/index.html  -o ${FTP_REMOTE_DIR}index.html
            put report/.htaccess   -o ${FTP_REMOTE_DIR}.htaccess
            put report/.htpasswd   -o ${FTP_REMOTE_DIR}.htpasswd
            bye
          "
          echo "✓ Report deployed to $FTP_HOST/$FTP_REMOTE_DIR"

      # ── Artifact fallback (runs when FTP secrets are NOT set) ────────────────
      - name: Upload report as artifact
        if: steps.ftp.outputs.enabled == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: pay-report-${{ github.run_number }}
          path: report/index.html
          retention-days: 30
