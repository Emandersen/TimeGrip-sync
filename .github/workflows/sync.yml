name: Sync Timegrip → Google Calendar

on:
  schedule:
    - cron: "0 5 * * *"   # 05:00 UTC = 06:00/07:00 Copenhagen
  workflow_dispatch:        # manual trigger from the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Build timegrip-sync
        run: nix build --no-link

      - name: Run sync
        env:
          SALLING_EMAIL:        ${{ secrets.SALLING_EMAIL }}
          SALLING_PASSWORD:     ${{ secrets.SALLING_PASSWORD }}
          GOOGLE_CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: nix run . -- --weeks 12
